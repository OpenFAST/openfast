[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "windforge-agent"
version = "0.1.0"
description = "WindForge local agent for executing OpenFAST simulations"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "Apache-2.0"}
dependencies = [
    "websockets>=12.0,<14.0",
    "numpy>=1.24,<3.0",
    "psutil>=5.9,<7.0",
    "click>=8.1,<9.0",
]

[project.optional-dependencies]
fatigue = [
    "fatpack>=0.7",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "ruff>=0.1",
]

[project.scripts]
windforge-agent = "agent.cli:main"

[tool.setuptools.packages.find]
include = ["agent*"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
