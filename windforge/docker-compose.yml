version: "3.9"

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: windforge
      POSTGRES_PASSWORD: windforge
      POSTGRES_DB: windforge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U windforge"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
